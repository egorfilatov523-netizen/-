<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Hippo Runner</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;}
canvas{display:block;margin:0 auto;}
#menu{position:absolute;inset:0;background:linear-gradient(#7ec8ff,#eaf6ff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.panel{background:rgba(255,255,255,0.9);padding:15px;border-radius:15px;margin:10px;text-align:center;}
button{margin:4px;padding:8px 12px;border:none;border-radius:10px;cursor:pointer;}
#ui{position:absolute;top:10px;left:10px;background:rgba(255,255,255,0.8);padding:10px;border-radius:10px;}
</style>
</head>
<body>

<div id="menu">
<h1>🦛 Hippo Runner</h1>
<div class="panel">
<button onclick="startGame()">▶ Играть</button>
<p>Монеты: <span id="coinsUI">0</span></p>
</div>
<div class="panel">
<b>Скины</b><br>
<button onclick="selectSkin('purple')">Фиолетовый</button>
<button onclick="selectSkin('blue')">Синий</button>
<button onclick="selectSkin('gold')">Золотой</button>
</div>
</div>

<div id="ui">
Жизни: <span id="livesUI">3</span><br>
Счёт: <span id="scoreUI">0</span><br>
Уклонение: ↓
</div>

<canvas id="game" width="900" height="350"></canvas>

<script>
let started=false,gameOver=false;
let score=0,lives=3,coins=0;
let speed=5,frame=0;
let duck=false;
let skin='purple';

const hippo={x:80,y:260,w:60,h:40,vy:0,jump:-13,grounded:false};
let obstacles=[],birds=[],coinsArr=[];

function startGame(){document.getElementById('menu').style.display='none';started=true;}
function selectSkin(s){skin=s;}

function spawnObstacle(){if(Math.random()<0.6)obstacles.push({x:900,y:260});}
function spawnBird(){if(Math.random()<0.4)birds.push({x:900,y:120+Math.random()*80});}
function spawnCoin(){coinsArr.push({x:900,y:180+Math.random()*100});}

setInterval(()=>{if(started)spawnObstacle();},1600);
setInterval(()=>{if(started)spawnBird();},2600);
setInterval(()=>{if(started)spawnCoin();},800);

document.addEventListener('keydown',e=>{
if(e.code==='Space'&&hippo.grounded&&started){hippo.vy=hippo.jump;hippo.grounded=false;}
if(e.code==='ArrowDown')duck=true;
if(gameOver&&e.code==='Enter')location.reload();
});
document.addEventListener('keyup',e=>{if(e.code==='ArrowDown')duck=false;});

function drawHippo(){
let color=skin==='gold'?'#d4af37':skin==='blue'?'#3b82f6':'#7e57c2';
let leg=Math.sin(frame/6)*4;
ctx.fillStyle=color;
ctx.beginPath();ctx.ellipse(hippo.x+30,hippo.y+25,30,20,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(hippo.x+55,hippo.y+20,18,15,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='white';ctx.beginPath();ctx.arc(hippo.x+60,hippo.y+15,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='black';ctx.beginPath();ctx.arc(hippo.x+61,hippo.y+15,2,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#5e3a82';ctx.fillRect(hippo.x+10,hippo.y+35,10,15+leg);ctx.fillRect(hippo.x+35,hippo.y+35,10,15-leg);
}

function drawTree(x,y){ctx.fillStyle='#6d4c41';ctx.fillRect(x+8,y,10,30);ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.arc(x+13,y,18,0,Math.PI*2);ctx.fill();}
function drawBird(b){ctx.fillStyle='black';ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x+12,b.y-6);ctx.lineTo(b.x+24,b.y);ctx.fill();}

function update(){
if(!started||gameOver)return;
frame++;
speed+=0.003;

hippo.vy+=0.7;
hippo.y+=hippo.vy;
if(hippo.y>=260){hippo.y=260;hippo.vy=0;hippo.grounded=true;}

obstacles.forEach(o=>o.x-=speed);
birds.forEach(b=>{b.y+=Math.sin(frame/10)*2;b.x-=speed+1;});
coinsArr.forEach(c=>c.x-=speed);

obstacles=obstacles.filter(o=>o.x>-60);
birds=birds.filter(b=>b.x>-60);
coinsArr=coinsArr.filter(c=>c.x>-60);

obstacles.forEach(o=>{
if(hippo.x<o.x+30&&hippo.x+60>o.x&&hippo.y<o.y+30&&hippo.y+40>o.y){lives--;obstacles.splice(obstacles.indexOf(o),1);if(lives<=0)gameOver=true;}
});

birds.forEach(b=>{
let h=duck?hippo.y+10:hippo.y;
if(hippo.x<b.x+20&&hippo.x+60>b.x&&h<b.y+20&&h+25>b.y){lives--;birds.splice(birds.indexOf(b),1);if(lives<=0)gameOver=true;}
});

coinsArr.forEach((c,i)=>{
let dx=hippo.x-c.x,dy=hippo.y-c.y;
if(Math.sqrt(dx*dx+dy*dy)<25){coins++;score++;coinsArr.splice(i,1);}
});

updateUI();
}

function draw(){
ctx.fillStyle='#87ceeb';ctx.fillRect(0,0,900,350);
ctx.fillStyle='#4caf50';ctx.fillRect(0,300,900,50);

drawHippo();
obstacles.forEach(o=>drawTree(o.x,o.y));
birds.forEach(drawBird);
ctx.fillStyle='gold';coinsArr.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,8,0,Math.PI*2);ctx.fill();});
ctx.fillStyle='black';ctx.fillText('Счёт:'+score,10,20);
ctx.fillText('Жизни:'+lives,10,40);
if(gameOver){ctx.fillStyle='red';ctx.font='30px Arial';ctx.fillText('GAME OVER',320,160);}
}

function updateUI(){
document.getElementById('scoreUI').innerText=score;
document.getElementById('livesUI').innerText=lives;
document.getElementById('coinsUI').innerText=coins;
}

function loop(){update();draw();requestAnimationFrame(loop);}loop();
</script>
</body>
</html>
